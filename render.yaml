# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: Dashboard → New → Blueprint → select SmartAnnoyer/Story-Pix
services:
  - type: web
    name: story-pix-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build --workspace=backend
    startCommand: npm run start:prod --workspace=backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUSKY
        value: '0'
      - key: API_PREFIX
        value: api/v1
      - key: AUTH_COOKIE_SECURE
        value: 'true'
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: EMAIL_PROVIDER
        value: console
      - key: BILLING_PROVIDER
        value: manual
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: VIEWER_BASE_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: story-pix-web
    runtime: static
    buildCommand: npm ci && npm run build --workspace=frontend
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: HUSKY
        value: '0'
      - key: VITE_APP_NAME
        value: Story-pix
      - key: VITE_APP_ENV
        value: production
      - key: VITE_API_BASE_URL
        sync: false
