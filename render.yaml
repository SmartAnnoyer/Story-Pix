# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: Dashboard → New → Blueprint → select SmartAnnoyer/Story-Pix
services:
  - type: web
    name: story-pix-api
    runtime: node
    plan: free
    region: singapore
    # Install devDependencies (@nestjs/cli, typescript) — required for nest build
    buildCommand: npm ci --include=dev && npm run build --workspace=backend
    startCommand: npm run start:prod --workspace=backend
    healthCheckPath: /api/v1/health
    envVars:
      # canvas@2.x has no Node 26 prebuilds; pin LTS so native deps stay installable
      - key: NODE_VERSION
        value: '20.19.0'
      - key: NODE_ENV
        value: production
      - key: HUSKY
        value: '0'
      - key: NPM_CONFIG_PRODUCTION
        value: 'false'
      - key: API_PREFIX
        value: api/v1
      - key: AUTH_COOKIE_SECURE
        value: 'true'
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: EMAIL_PROVIDER
        value: console
      - key: BILLING_PROVIDER
        value: manual
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Required — Atlas URI with 0.0.0.0/0 or Render egress allowed
      - key: MONGODB_URI
        sync: false
      # Hostname is OK — API normalizes to https://… at runtime
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: story-pix-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VIEWER_BASE_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: story-pix-web
    runtime: static
    buildCommand: npm ci --include=dev && npm run build --workspace=frontend
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: '20.19.0'
      - key: HUSKY
        value: '0'
      - key: NPM_CONFIG_PRODUCTION
        value: 'false'
      - key: VITE_APP_NAME
        value: Story-pix
      - key: VITE_APP_ENV
        value: production
      # Hostname only; frontend normalizes to https://…/api/v1 at build time
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: story-pix-api
          property: host
